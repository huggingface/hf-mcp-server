name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        type: choice
        description: 'Version bump type'
        required: true
        options:
          - patch
          - minor
          - major
      prerelease:
        type: boolean
        description: 'Create as prerelease'
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.5.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Enable Corepack
        run: |
          npm install --global corepack@0.35.0
          corepack enable pnpm
          corepack prepare pnpm@11.5.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump versions
        id: version
        run: |
          # Bump root version
          npm version ${{ inputs.version }} --no-git-tag-version

          # Get the new version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Sync versions in workspaces
          cd packages/app && npm version $NEW_VERSION --no-git-tag-version
          cd ../mcp && npm version $NEW_VERSION --no-git-tag-version
          cd ../..

      - name: Build packages
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Create Release Commit
        run: |
          git add .
          git commit -m "chore: release v${{ steps.version.outputs.new-version }}"
          git tag "v${{ steps.version.outputs.new-version }}"

      - name: Push changes
        run: |
          git push origin main
          git push origin --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v2
        with:
          tag_name: v${{ steps.version.outputs.new-version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}

      - name: Publish to npm
        if: ${{ !inputs.prerelease }}
        run: |
          # Publish the mcp package first (dependency)
          cd packages/mcp
          pnpm publish --access public --no-git-checks

          # Then publish the main app package  
          cd ../app
          pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
